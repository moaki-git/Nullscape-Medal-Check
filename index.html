<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NullScape Medal Checker</title>
    <link rel="icon" href="Images/Favicon/Image.png" type="image/png">
    <link rel="stylesheet" href="style.css">
</head>

<body>

<img src="Images/Theming/Curses.png" class="center-image">

<div class="top-row">
    
    <button class="button-question" id="help">?</button>
    <form class="form-group">
     <label class="Label-Color">Level:</label>
     <input type="number" id="level" class="Level-Input">
    </form>
    <form class="form-group">
     <label class="Label-Color">Players:</label>
     <input type="number" id="level" min="1" max="20" class="Level-Input">
    </form>
    <div class="selection-area">
        <form class="form-group">
        <label class="Label-Color">Difficulty</label>
        <div class="custom-dropdown" id="difficultyDropdown">
          <div class="dropdown-selected" id="dropdownSelected">
            Select..
            </div>

            <div class="dropdown-menu" id="dropdownMenu">
              <div class="dropdown-item" data-value="C">Casual</div>
              <div class="dropdown-item" data-value="S">Standard</div>
              <div class="dropdown-item" data-value="E">Extreme</div>
            </div>
        </div>

        <div id="imageBox" class="image-box">
            <img id="difficultyImage"
                 src="Images/Icons/Orb.png"
                 class="difficulty-image">
        </div>
        <script src="SSZR.js"></script>
    </div>
    </form>
</div>

<div class="container-enemies">
  <img src="Images/Theming/Enemiesheader.png"  class="selection-box-images">
</div>

<div class="container-greater-curses">
    <img src="Images/Theming/GreaterCursesheader.png" class="selection-box-images">
</div>



</body>
</html>
