 <!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NullScape Medal Checker</title>
    <link rel="icon" href="Images/Favicon/Image.png" type="image/png">
    <link rel="stylesheet" href="style.css">
  </head>
  <body>

    <div class="container">
      <h1>NullScape Medal Checker</h1>
      <form id="medalForm">
        <label for="medalInput">Enter Medal Name:</label>
        <input type="text" id="medalInput" name="medalInput" required>
        <button type="submit">Check Medal</button>
      </form>
      <div id="result"></div>

    <script src="main.js"></script>
  </body>
</html>
