<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NullScape Medal Checker</title>
    <link rel="icon" href="Images/Favicon/Image.png" type="image/png">
    <link rel="stylesheet" href="style.css">
</head>

<body>

<img src="Images/Theming/Curses.png" class="center-image">

<div class="top-row">
    <button class="button-question" id="help">?</button>
    <div class="selection-area">

        <select id="difficulty" class="difficulty">
            <option value="">Select Difficulty..</option>
            <option value="C">Casual</option>
            <option value="S">Standard</option>
            <option value="E">Extreme</option>
        </select>

        <div id="imageBox" class="image-box">
            <img id="difficultyImage"
                 src="Images/Icons/Orb.png"
                 class="difficulty-image">
        </div>
        <script src="SSZR.js"></script>
    </div>
</div>

<div class="container-yep">
    <h1>ENEMY SELECTIONS</h1>
    still in development 🔨
</div>

<div class="container-gc">
    <h1>GREATER CURSES</h1>
    still in development 🔨
</div>



</body>
</html>
